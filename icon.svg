  <ellipse cx="236" cy="314" rx="11" ry="15" fill="#c75d86"/>
  <ellipse cx="276" cy="314" rx="11" ry="15" fill="#c75d86"/>

  <!-- 눈 -->
  <circle cx="212" cy="264" r="13" fill="#5a3a48"/>
  <circle cx="300" cy="264" r="13" fill="#5a3a48"/>
  <circle cx="216" cy="260" r="4.5" fill="#fff"/>
  <circle cx="304" cy="260" r="4.5" fill="#fff"/>

