  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 떨어지는 동전 -->
  <circle cx="256" cy="118" r="34" fill="url(#coin)" stroke="#fff" stroke-opacity=".55" stroke-width="4"/>
  <text x="256" y="120" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="40" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="central">₩</text>

  <!-- 귀 -->
  <path d="M182 198 L150 150 L214 176 Z" fill="#ff7da3"/>
  <path d="M330 198 L362 150 L298 176 Z" fill="#ff7da3"/>

  <!-- 다리 -->
  <rect x="196" y="372" width="40" height="46" rx="14" fill="#ff6f9c"/>
  <rect x="276" y="372" width="40" height="46" rx="14" fill="#ff6f9c"/>

  <!-- 몸통 -->
  <ellipse cx="256" cy="292" rx="150" ry="120" fill="url(#pig)"/>

  <!-- 동전 투입구 -->
  <rect x="232" y="188" width="48" height="13" rx="6" fill="#d65b85"/>

  <!-- 코(주둥이) -->
